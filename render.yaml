services:
  - type: web
    name: motioninsightai
    runtime: python
    rootDir: motioninsight/backend
    buildCommand: bash build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set manually in the Render dashboard — never commit this value
      - key: LD_LIBRARY_PATH
        value: /usr/lib/x86_64-linux-gnu
